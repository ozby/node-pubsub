name = "ingest-lens"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
account_id = "e93986039ea9bd9729fa534a29e9e88f" # ozby account — not a secret; CF account IDs are public identifiers

# NOTE: wrangler environments do NOT inherit `durable_objects`, `queues`, or
# `analytics_engine_datasets` from the top level — each env must re-declare
# them. Hyperdrive/KV/R2 IDs per-env are synced by
# `infra/src/deploy/sync-wrangler-ids.ts` after `pulumi up`.
#
# Each env's Worker is auto-named `ingest-lens-<env>` by wrangler and is
# deployed via `wrangler deploy --env <env>`.

# ─── dev environment ──────────────────────────────────────────────────────
# Deployed Worker name: ingest-lens-dev
# Custom domain: api.dev.ingest-lens.ozby.dev (wrangler atomically creates Worker +
# route + DNS + cert when `custom_domain = true`).

# General rate limiter — 100 req/60s (wrangler dev / local only; envs declare their own below)
# namespace_id is a stable project-scoped UUID; CF creates the namespace on first deploy.
[[durable_objects.bindings]]
name = "TOPIC_ROOMS"
class_name = "TopicRoom"

[[durable_objects.bindings]]
name = "HEAL_STREAM"
class_name = "HealStreamDO"

[[rate_limiting]]
binding = "RATE_LIMITER"
namespace_id = "b8f2e4a6-1c3d-4f5e-8a7b-9c0d1e2f3a4b"
simple = { limit = 100, period = 60 }

# Auth rate limiter — 5 req/60s (login + register brute-force protection)
[[rate_limiting]]
binding = "AUTH_RATE_LIMITER"
namespace_id = "d0a4f6c8-3e5f-6a7b-0c9d-1e2f3a4b5c6d"
simple = { limit = 5, period = 60 }

[env.dev]
workers_dev = false
routes = [{ pattern = "api.dev.ingest-lens.ozby.dev", custom_domain = true }]

[env.dev.vars]
NODE_ENV = "development"
ALLOWED_ORIGIN = "https://dev.ingest-lens.ozby.dev"
LANGFUSE_BASE_URL = "https://cloud.langfuse.com"

[[env.dev.rate_limiting]]
binding = "RATE_LIMITER"
namespace_id = "b8f2e4a6-1c3d-4f5e-8a7b-9c0d1e2f3a4b"
simple = { limit = 100, period = 60 }

[[env.dev.rate_limiting]]
binding = "AUTH_RATE_LIMITER"
namespace_id = "d0a4f6c8-3e5f-6a7b-0c9d-1e2f3a4b5c6d"
simple = { limit = 5, period = 60 }

[[env.dev.hyperdrive]]
binding = "HYPERDRIVE"
id = "e9f1d0a87a0c49a3ba0c74ef657bc7f0"

[[env.dev.kv_namespaces]]
binding = "KV"
id = "97e55cfda54446d4aab3b2eb54ebba50"

[[env.dev.r2_buckets]]
binding = "ASSETS"
bucket_name = "ingest-lens-dev-assets"

[[env.dev.durable_objects.bindings]]
name = "TOPIC_ROOMS"
class_name = "TopicRoom"

[[env.dev.durable_objects.bindings]]
name = "HEAL_STREAM"
class_name = "HealStreamDO"

[[env.dev.migrations]]
tag = "v1"
new_sqlite_classes = ["TopicRoom", "HealStreamDO"]

[[env.dev.queues.producers]]
binding = "DELIVERY_QUEUE"
queue = "delivery-queue-dev"

[[env.dev.queues.consumers]]
queue = "delivery-queue-dev"
max_batch_size = 10
max_batch_timeout = 5
max_concurrency = 8
max_retries = 5
dead_letter_queue = "delivery-dlq-dev"

[[env.dev.analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "delivery_events_dev"

[env.dev.triggers]
# Hourly TTL purge of expired intake review payloads.
crons = ["0 * * * *"]

# ─── prd environment ──────────────────────────────────────────────────────
# Deployed Worker name: ingest-lens-prd
# Custom domain: api.ingest-lens.ozby.dev

[env.prd]
workers_dev = false
routes = [{ pattern = "api.ingest-lens.ozby.dev", custom_domain = true }]

[env.prd.vars]
NODE_ENV = "production"
ALLOWED_ORIGIN = "https://ingest-lens.ozby.dev"
LANGFUSE_BASE_URL = "https://cloud.langfuse.com"

[[env.prd.rate_limiting]]
binding = "RATE_LIMITER"
namespace_id = "c9f3e5b7-2d4e-5f6a-9b8c-0d1e2f3a4b5c"
simple = { limit = 100, period = 60 }

[[env.prd.rate_limiting]]
binding = "AUTH_RATE_LIMITER"
namespace_id = "e1b5a7d9-4f6a-7b8c-1d0e-2f3a4b5c6d7e"
simple = { limit = 5, period = 60 }

[env.prd.ai]
binding = "AI"

[[env.prd.hyperdrive]]
binding = "HYPERDRIVE"
id = "placeholder-prd-hyperdrive-id"

[[env.prd.kv_namespaces]]
binding = "KV"
id = "placeholder-prd-kv-id"

[[env.prd.r2_buckets]]
binding = "ASSETS"
bucket_name = "placeholder-prd-r2-bucket"

[[env.prd.durable_objects.bindings]]
name = "TOPIC_ROOMS"
class_name = "TopicRoom"

[[env.prd.durable_objects.bindings]]
name = "HEAL_STREAM"
class_name = "HealStreamDO"

[[env.prd.migrations]]
tag = "v1"
new_sqlite_classes = ["TopicRoom", "HealStreamDO"]

[[env.prd.queues.producers]]
binding = "DELIVERY_QUEUE"
queue = "delivery-queue-prd"

[[env.prd.queues.consumers]]
queue = "delivery-queue-prd"
max_batch_size = 10
max_batch_timeout = 5
max_concurrency = 8
max_retries = 5
dead_letter_queue = "delivery-dlq-prd"

[[env.prd.analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "delivery_events_prd"

[env.prd.triggers]
# Hourly TTL purge of expired intake review payloads.
crons = ["0 * * * *"]
